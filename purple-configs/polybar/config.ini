; include-file = $HOME/.config/polybar/modules/battery.ini
[colors]
background        = #2e2640
background-alt    = #5d4b73
foreground        = #e8e3c9
primary           = #8fa7c4
secondary         = #c284a4
alert             = #c284a4
disabled          = #8fa7c4
binding_mode      = #c99ad1

[bar/main]
width = 100%
height = 32pt
radius = 0

enable-ipc = true 

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0pt

; ---- Borders Removed ----
border-size = 0
border-top-size = 0
border-bottom-size = 0
border-left-size = 0
border-right-size = 0

padding-left = 0
padding-right = 2

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}


font-0 = "JetBrainsMono Nerd Font:pixelsize=12"
font-1 = "JetBrains Mono:pixelsize=12"

modules-left = xworkspaces xwindow  
modules-center = date
; modules-right = pulseaudio xkeyboard systray brightnessctl rofi-power
modules-right = pulseaudio memory cpu systray power-menu

cursor-click = pointer
cursor-scroll = ns-resize

; enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt


[module/xworkspaces]
type = internal/xworkspaces
format-prefix = %{T1} ÓĚĹ %{T-}

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.primary}
label-active-padding = 2

label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1


[module/brightnessctl]
type = custom/script
exec = ~/.config/polybar/scripts/brightnessctl.sh

scroll-up = exec brightnessctl set +5%
scroll-down = exec brightnessctl set 5%-
interval = 0.5

label = %output%
label-foreground = ${colors.foreground}

[module/xwindow]
type = internal/xwindow
# label = %title:0:60:...%
label = %class%
# [module/xwindow]
# type = custom/script
# exec = ~/personalScripts/active_window_name.sh
# interval = 1
# label = %output%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}
[module/rofi-power]
type = custom/text
content = "ÔÄĎ"
click-left = ~/.config/rofi/scripts/powermenu_t1

# [module/xkeyboard]
# type = internal/xkeyboard
# blacklist-0 = num lock
# label-layout = %layout%
# label-layout-foreground = ${colors.primary}
# label-indicator-padding = 2
# label-indicator-margin = 1
# label-indicator-foreground = ${colors.background}
# label-indicator-background = ${colors.secondary}
#
[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÓČ¶ "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôčõ  "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network 
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %signal% %local_ip%
label-connected-alt = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/wireless]
type = internal/network
interface = wlp2s0  # Replace 'wlan0' with your actual Wi-Fi interface name
interval = 2
format-connected = <ramp-signal> <label-connected>
format-disconnected = <label-disconnected>
label-connected = %essid% %local_ip%
label-disconnected = Disconnected
ramp-signal-0 = ůį§Į  # Weakest signal
ramp-signal-1 = ůį§ü
ramp-signal-2 = ůį§Ę
ramp-signal-3 = ůį§•
ramp-signal-4 = ůį§®  # Strongest signal
ramp-signal-foreground = ${colors.foreground}  # Adjust color as needed

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %I:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.foreground}

[settings]
screenchange-reload = true
pseudo-transparency = true

; [module/power-menu]
; type = custom/menu
; expand-right = true
; label-open = "‚ŹĽ"
; label-close = "ÔÄć"
; ; label-separator = " | "
; menu-0-0 = "Shutdown"
; menu-0-0-exec = systemctl poweroff
;
; menu-0-1 = "Restart"
; menu-0-1-exec = systemctl reboot
;
; menu-0-2 = "Logout"
; menu-0-2-exec = i3-msg exit


[module/power-menu]
type = custom/text
content = "‚ŹĽ"
click-left = ~/.config/polybar/scripts/rofi-power.sh

; vim:ft=dosini
