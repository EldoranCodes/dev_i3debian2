backend = "xrender";          
vsync = true;
fading = true;
fade-in-step = 0.02;
fade-out-step = 0.02;
fade-delta = 5;

no-fading-openclose = false;
no-fading-destroyed-argb = false;

shadow = false;
corner-radius = 8;
rounded-corners-exclude = [
  "class_g = 'i3-frame'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];
opacity-rule = [
  "90:class_g *= 'i3-frame'"
];
